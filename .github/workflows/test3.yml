---
name: "Delete Hetzner Cloud runner"

on:
  workflow_dispatch:
     inputs:  
       runner_scope:
         type: choice 
         description: Select scope for this runner
         required: false
         options:
           - repo
           - org
         default: 'org'

  
jobs:
  collect:
    name: Collect runners and build deletion matrix
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Generate GitHub App authentication token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3.0.0
        with:
          app-id: ${{ secrets.GH_APP_SHRHC_ID }}
          private-key: ${{ secrets.GH_APP_SHRHC_PRIVATE_KEY }}
          
      - name: Fetch all organization self-hosted runners
        id: runners
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          SCOPE: ${{ inputs.runner_scope }}
        run: |
          if [ "$SCOPE" = "repo" ]; then
            echo "Fetching repo runners"
            gh api /repos/${{ github.repository }}/actions/runners --paginate > runners.json
          else
            echo "Fetching org runners"
            gh api /orgs/${{ github.repository_owner }}/actions/runners --paginate > runners.json
          fi

      - name: Build deletion matrix (extract server IDs from labels)
        id: matrix
        run: |
          MATRIX=$(
            jq -c '
            [
              .runners[]
              | {
                  runner: .name,
                  server_id: (
                    .labels[]
                    | select(.name | startswith("server_id="))
                    | .name
                    | sub("server_id="; "")
                  )
                }
              | select(.server_id != null)
            ]
            ' runners.json
          )
      
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT


  delete:
    name: Delete and deregister runner
    runs-on: ubuntu-latest
    needs: collect

    if: ${{ needs.collect.outputs.matrix != '[]' }}

    strategy:
      matrix:
        include: ${{ fromJson(needs.collect.outputs.matrix) }}

    steps:
      - name: Generate GitHub App authentication token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3.0.0
        with:
          app-id: ${{ secrets.GH_APP_SHRHC_ID }}
          private-key: ${{ secrets.GH_APP_SHRHC_PRIVATE_KEY }}
          
      - name: Delete Hetzner server and GitHub runner
        uses: getupcloud-images/hcloud-github-runner@085e13c939204d85525bd6df37d6027bf0a1afef
        with:
          mode: delete
          github_token: ${{ steps.generate-token.outputs.token }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          server_id: ${{ matrix.server_id }}
          name: ${{ matrix.runner }}
          runner_scope: ${{ inputs.runner_scope }}
