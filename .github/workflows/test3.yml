---
name: "Delete Hetzner Cloud runner"

on:
  workflow_dispatch:
     inputs:  
       runner_scope:
         type: choice 
         description: Select scope for this runner
         required: false
         options:
           - repo
           - org
         default: 'org'
       runner_group:
         type: choice 
         description: Select scope for this runner
         required: false
         options:
           - Default
           - Daniel
           - Test
         default: 'Default'


jobs:
  collect:
    name: Collect runners and build deletion matrix
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Generate GitHub App authentication token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3.0.0
        with:
          app-id: ${{ secrets.GH_APP_SHRHC_ID }}
          private-key: ${{ secrets.GH_APP_SHRHC_PRIVATE_KEY }}
          
      - name: Fetch all organization self-hosted runners
        id: runners
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          INPUT_RUNNER_SCOPE: ${{ inputs.runner_scope }}
          INPUT_RUNNER_GROUP: ${{ inputs.runner_group }}
        run: |
          # Function to exit the script with a failure message
          function exit_with_failure() {
          	echo >&2 "FAILURE: $1"  # Print error message to stderr
          	exit 1
          }

          # 
          if [[ "$INPUT_RUNNER_SCOPE" == "org" ]]; then
            curl -L \
            	--fail-with-body \
            	-o "github-runner-groups.json" \
            	-H "Accept: application/vnd.github+json" \
            	-H "Authorization: Bearer ${GH_TOKEN}" \
            	-H "X-GitHub-Api-Version: 2022-11-28" \
            	"https://api.github.com/orgs/${{ github.repository_owner }}/actions/runner-groups" \
            	|| exit_with_failure "Failed to get GitHub Runner groups from ${INPUT_RUNNER_SCOPE}:${INPUT_RUNNER_GROUP}!"

            # 
            MY_GITHUB_RUNNER_GROUP_ID=$(jq -er ".runner_groups[] | select(.name == \"$INPUT_RUNNER_GROUP\") | .id" < "github-runner-groups.json")
  
            # Check if MY_GITHUB_RUNNER_GROUP_ID is an integer
            if [[ ! "$MY_GITHUB_RUNNER_GROUP_ID" =~ ^[0-9]+$ ]]; then
              exit_with_failure "Failed to get ID of the GitHub runner group!"
            fi

            echo "Fetching org runners"
            curl -L \
            	--fail-with-body \
            	-o "runners.json" \
            	-H "Accept: application/vnd.github+json" \
            	-H "Authorization: Bearer ${GH_TOKEN}" \
            	-H "X-GitHub-Api-Version: 2022-11-28" \
            	"https://api.github.com/orgs/${{ github.repository_owner }}/actions/runner-groups/${MY_GITHUB_RUNNER_GROUP_ID}/runners" \
            	|| exit_with_failure "Failed to fetch runners from ${INPUT_RUNNER_SCOPE}:${INPUT_RUNNER_GROUP}!"

          else
            echo "Fetching repo runners"
            curl -L \
            	--fail-with-body \
            	-o "runners.json" \
            	-H "Accept: application/vnd.github+json" \
            	-H "Authorization: Bearer ${GH_TOKEN}" \
            	-H "X-GitHub-Api-Version: 2022-11-28" \
            	"https://api.github.com/repos/${{ github.repository }}/actions/runners" \
            	|| exit_with_failure "Failed to fetch runners from ${INPUT_RUNNER_SCOPE}:${INPUT_RUNNER_GROUP}!"
          fi

      - name: Build deletion matrix (extract server IDs from labels)
        id: matrix
        run: |
          MATRIX=$(
            jq -c '
            [
              .runners[]
              | {
                  runner: .name,
                  server_id: (
                    .labels[]
                    | select(.name | startswith("server_id="))
                    | .name
                    | sub("server_id="; "")
                  )
                }
              | select(.server_id != null)
            ]
            ' runners.json
          )
      
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT


  delete:
    name: Delete and deregister runner
    runs-on: ubuntu-latest
    needs: collect

    if: ${{ needs.collect.outputs.matrix != '[]' }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.collect.outputs.matrix) }}

    steps:
      - name: Generate GitHub App authentication token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3.0.0
        with:
          app-id: ${{ secrets.GH_APP_SHRHC_ID }}
          private-key: ${{ secrets.GH_APP_SHRHC_PRIVATE_KEY }}
          
      - name: Delete Hetzner server and GitHub runner
        # uses: wydler/hcloud-self-hosted-github-runner@c2a407295a3f3ccf0ca7473d0489849a8fd71354  # 1.0.0
        uses: wydler/hcloud-self-hosted-github-runner@9b01f89f78542a52537c8ca69961a7b4d31d6335
        with:
          mode: delete
          github_token: ${{ steps.generate-token.outputs.token }}
          hcloud_token: ${{ secrets.DW_HCLOUD_TOKEN_GHSHR_RW }}
          server_id: ${{ matrix.server_id }}
          name: ${{ matrix.runner }}
          runner_scope: ${{ inputs.runner_scope }}
