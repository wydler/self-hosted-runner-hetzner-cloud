---
name: "Example"

on:      
   workflow_dispatch:
     inputs:
       location:
        type: choice 
        required: false
        options: 
          - hel1  # Helsinki, Finnland
          - fsn1  # Falkenstein, Germany
          - nbg1  # Nuremberg, Germany
        default: "hel1"     
       os:
        type: choice 
        required: false
        options: 
          - ubuntu-22.04
          - ubuntu-24.04
        default: "ubuntu-24.04"
       servertype:
        type: choice 
        required: true
        options:
          - cx33
          - cpx22
        default: "cx33"


jobs:
  get-hcloud-snapshot:
    name: Get current snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Install Hetzner Cloud Cli
        uses: hetznercloud/setup-hcloud@ac9e7d74fb41a3ca44a6a3da123bd5aa70731e3a  # v2.0.0

      - name: Query und delete snapshots
        id: hcloud_snapshot
        run: |
          # List all available snapshots
          echo -e "$(hcloud image list --type "snapshot" -l "os=${{ inputs.servertype }}" -s "id:desc")\n"

          # Query
          object=$(hcloud image list --output "columns=ID" --output "noheader" --type "snapshot" -l "os=${{ inputs.servertype }}" -s "id:desc" | tail -n +$((KEEP_SNAPSHOTS+1)) )
          
          if [ -n "$object" ]; then
            echo "$(echo $objects | wc -w) Snapshot(s) zum Löschen gefunden:"

            echo ID: "$i"
            echo "os=test" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Keine Snapshot für das angegebene OS gefunden."
            exit 1
          fi
        env:
           HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
    outputs:
      snapshot_id: ${{ steps.hcloud_snapshot.outputs.id }}


  create-runner:
    name: Create Hetzner Cloud runner
    runs-on: ubuntu-latest
    needs: get-hcloud-snapshot
    
    outputs:
      label: ${{ steps.create-hcloud-runner.outputs.label }}
      server_id: ${{ steps.create-hcloud-runner.outputs.server_id }}

    strategy:
      matrix:
        runner: [1, 2]  # 2 Runner erzeugen
        
    steps:
      - name: Generate GitHub token
        id: generate_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3.0.0
        with:
          app-id: ${{ secrets.GH_APP_SHRHC_ID }}
          private-key: ${{ secrets.GH_APP_SHRHC_PRIVATE_KEY }}
          
      - name: Create runner ${{ matrix.runner }}
        id: create-hcloud-runner
        # uses: Cyclenerd/hcloud-github-runner@54da4707b01dfca5dd38cd15cde4afcd950f2b4a  # v1.4.0
        # uses: wydler/hcloud-self-hosted-github-runner@customize
        uses: getupcloud-images/hcloud-github-runner@085e13c939204d85525bd6df37d6027bf0a1afef
        with:
          mode: create
          github_token: ${{ steps.generate_token.outputs.token }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          server_type: ${{ inputs.servertype }}
          location: ${{ inputs.location }}  
          image: "386465088"
          server_wait: "120"
          # name: "gh-runner-${{ matrix.runner }}"
          runner_scope: "repo"
          create_wait: "1" # 1*10 Sekunden = 10 Sekunden
